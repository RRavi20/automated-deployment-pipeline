name: Docker Build and Test

# 1. When should this run?
on:
    workflow_dispatch:
    push:
        branches: [ "main" ] # Runs Whenever you push to the main branch

jobs:
    build-and-test:
        runs-on: ubuntu-latest # This starts a fresh Linux machine in the cloud

        steps:
            - name: Checkout code
              uses: actions/checkout@v4 # This copies your code to the cloud machine

            - name: Build the Docker image
              run: docker build -t my-web-app . 

            - name: Verify Container Starts
              run: |
                docker run -d -p 8080:3000 --name test-container my-web-app
                sleep 5
                docker ps | grep test-container

            - name: Deploy to AWS
              uses: appleboy/ssh-action@master
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.USERNAME }}
                key: ${{ secrets.SSH_KEY }}
                script: | 
                  # 1. Update and install Git if needed
                  sudo apt-get update -y && sudo apt-get install git -y
                  
                  # 2. Get the latest code from GitHub
                  if [ -d "my-web-app" ]; then
                    cd my-web-app && git pull
                  else
                    git clone https://github.com/YourUsername/your-repo-name.git my-web-app 
                    cd my-web-app
                  fi
                  
                  # 3. Clean up old containers
                  docker stop my-web-app || true
                  docker rm my-web-app || true
                  
                  # 4. Build and Run the new version
                  docker build -t my-web-app .
                  docker run -d -p 80:3000 --name my-web-app my-web-app .

